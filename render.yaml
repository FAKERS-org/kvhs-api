services:
  - type: web
    name: kvhs-api
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kvhs-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: ALLOWED_ORIGINS
        value: ["http://localhost:3000"]
      - key: AUTO_CREATE_TABLES
        value: "true"

databases:
  - name: kvhs-db
    databaseName: kvhs
    user: kvhs
    plan: free
